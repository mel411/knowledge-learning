<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Connexion - Knowledge Learning</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/pages.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.0.0/dist/umd/supabase.js"></script>
  <script src="/auth.js"></script>
</head>

<body class="login-page">
  <div id="header"></div>
  <div class="login-bg"></div>
  <div class="login-container">
    <div class="login-card">
      <h1 class="login-logo">KNOWLEDGE LEARNING</h1>
      <h2>Connexion</h2>
      <p class="login-sub">Accédez à votre compte</p>
      <form>
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="Entrez votre email" required>
        <label>Mot de passe</label>
        <input type="password" id="loginPassword" placeholder="Entrez votre mot de passe" required>
        <div class="remember">
          <input type="checkbox" id="remember">
          <label for="remember">Rester connecté</label>
        </div>
        <button type="submit" class="login-btn">Se connecter</button>
        <p id="loginMessage"></p>
      </form>
      <a
href="#"
class="forgot-password"
onclick="forgotPassword()"
>
Mot de passe oublié ?
</a>
    </div>
  </div>
  <div id="loader" class="loader hidden"></div>
  <div id="footer"></div>

<script src="/connexion.js"></script>

</body>
</html>
