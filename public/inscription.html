<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Inscription - Knowledge Learning</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/pages.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.0.0/dist/umd/supabase.js"></script>
  <script src="/auth.js"></script>
</head>

<body class="register-page">
  <div id="header"></div>
  <div class="login-bg"></div>
  <div class="login-container">
    <div class="login-card">
      <h1 class="login-logo">KNOWLEDGE LEARNING</h1>
      <h2>Inscription</h2>
      <p class="register-sub">Créez votre compte</p>
      <form onsubmit="event.preventDefault(); register();">
        <label>Nom</label>
        <input type="text" id="registerName" placeholder="Entrez votre nom" required>

        <label>Email</label>
        <input type="email" id="registerEmail" placeholder="Entrez votre email" required>

        <label>Mot de passe</label>
        <input type="password" id="registerPassword" placeholder="Entrez votre mot de passe" required>

        <label>Confirmer le mot de passe</label>
        <input type="password" id="registerPasswordConfirm" placeholder="Confirmez votre mot de passe" required>

        <button type="submit" class="register-btn">S'inscrire</button>

        <!-- MESSAGE -->
        <p id="registerInfo" class="form-info"></p>

        <!-- EXTRA TEXT -->
        <p class="forgot-password">
          Après inscription, utilisez le lien d’activation reçu par email.
        </p>

        <!-- LOGIN REDIRECT -->
        <p class="forgot-password">
          Vous avez déjà un compte ?
          <a href="connexion.html" class="login-link">Se connecter</a>
        </p>
      </form>
    </div>
  </div>

  <div id="loader" class="loader hidden"></div>
  <div id="footer"></div>
  
  <script>
  
  // ================= REGISTER =================
  async function register() {
    const loader = document.getElementById("loader");
    const info = document.getElementById("registerInfo");
    
    loader.classList.remove("hidden");

    const name =
    document.getElementById("registerName").value.trim();

    const email =
    document.getElementById("registerEmail").value.trim();

    const password =
    document.getElementById("registerPassword").value;

    const confirm =
    document.getElementById("registerPasswordConfirm").value;
    
    // PASSWORD CHECK
    if(password !== confirm){
      info.innerText =
        "Les mots de passe ne correspondent pas.";
      info.style.color = "red";
      loader.classList.add("hidden");
      return;
    }
    
    try{

      // CREATE AUTH USER
      const {
        data,
        error
      } = await window.sb.auth.signUp({
        email,
        password,
        options: {
          data: {
            name: name
          }
        }
      });
      
      if(error){
        info.innerText = error.message;
        info.style.color = "red";

        loader.classList.add("hidden");
        return;
      }
      
      // CREATE PUBLIC PROFILE
      await window.sb
        .from("users")
        .insert({
          new_id: data.user.id,
          email: email,
          name: name,
          role: "client"
        });
        
        info.innerText =
          "Compte créé. Vérifiez votre email.";
          info.style.color = "green";
        
        }catch(err){
          console.error(err);
          info.innerText =
            "Erreur serveur.";
          info.style.color = "red";
        }
        
        loader.classList.add("hidden");
      }
      
      // ================= HEADER / FOOTER =================
      document.addEventListener("DOMContentLoaded", () => {
        loadLayout();
      });
      
    </script>
  </body>
</html>
