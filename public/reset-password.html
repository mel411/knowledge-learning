<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>
Nouveau mot de passe
</title>

<link
rel="stylesheet"
href="styles/layout.css"
/>

<link
rel="stylesheet"
href="styles/components.css"
/>

<link
rel="stylesheet"
href="styles/pages.css"
/>

<link
rel="icon"
href="images/Favicon.ico"
/>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/auth.js"></script>

</head>

<body>

<div id="header"></div>

<section class="auth-page">

<div class="auth-wrapper">

<div class="auth-card premium-card">

<p class="section-overline">
Sécurité du compte
</p>

<h1 class="auth-title">
Créer un nouveau mot de passe
</h1>

<p class="auth-subtitle">
Choisissez un mot de passe sécurisé pour protéger votre compte et continuer votre apprentissage.
</p>

<div class="auth-form">

<div class="form-group">

<label>
Nouveau mot de passe
</label>

<input
type="password"
id="newPassword"
class="auth-input"
placeholder="Entrez votre nouveau mot de passe"
/>

<label>
    Confirmer le mot de passe
</label>

<input
type="password"
id="confirmPassword"
placeholder="Confirmez votre mot de passe"
class="auth-input"
/>

</div>

<button
class="btn-main"
onclick="updatePassword()"
id="updateBtn"
>
Mettre à jour le mot de passe
</button>

<p
id="successMessage"
class="success-message"
style="display:none;"
>
Mot de passe mis à jour avec succès.
</p>

</div>

</div>

</div>

</section>

<div id="footer"></div>

<script>

document.addEventListener(
"DOMContentLoaded",
async ()=>{

const hash =
window.location.hash;

if(hash){

const params =
new URLSearchParams(
hash.substring(1)
);

const access_token =
params.get("access_token");

const refresh_token =
params.get("refresh_token");

if(access_token && refresh_token){

await window.sb.auth.setSession({
access_token,
refresh_token
});

}

}

await window.restoreSession();

});

async function updatePassword(){

const password =
document.getElementById(
"newPassword"
).value.trim();

const confirmPassword =
document.getElementById(
"confirmPassword"
).value.trim();

if(!password || !confirmPassword){

alert(
"Veuillez remplir tous les champs."
);

return;

}

if(password.length < 6){

alert(
"Le mot de passe doit contenir au moins 6 caractères."
);

return;

}

if(password !== confirmPassword){

alert(
"Les mots de passe ne correspondent pas."
);

return;

}

const {
error
} =
await window.sb.auth.updateUser({
password
});

if(error){

console.error(error);

alert(
error.message || "Erreur lors de la mise à jour."
);

return;

}

alert(
"Votre mot de passe a été mis à jour."
);

window.location.href =
"/connexion.html";

}

</script>

</body>
</html>
